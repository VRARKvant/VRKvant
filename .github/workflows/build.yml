name: Build Manifests & CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**/*.md'
      - 'scripts/build.js'
      - 'js/**'
      - 'css/**'
      - 'tests/**'
      - 'e2e/**'
      - 'package.json'
      - 'vitest.config.js'
      - 'playwright.config.js'
      - 'tailwind.config.js'
      - 'ROADMAP.md'
      - 'GEMINI.md'
      - '.github/workflows/build.yml'

jobs:
  build-and-unit:
    name: 🏗️ Build & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: 🛠️ Build Assets (CSS & Manifests)
        id: build
        run: |
          echo "### 📦 Этапы сборки" >> $GITHUB_STEP_SUMMARY
          echo "| Этап | Статус | Инфо |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :--- |" >> $GITHUB_STEP_SUMMARY
          
          # Сборка CSS
          if npm run build:css; then
            echo "| 🛠 Сборка CSS | ✅ | Минификация завершена |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🛠 Сборка CSS | ❌ | Ошибка tailwind.config.js |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Сборка Манифестов
          if node scripts/build.js; then
            echo "| 📦 Генерация манифестов | ✅ | Файлы .json обновлены |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📦 Генерация манифестов | ❌ | Ошибка scripts/build.js |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Create test results directory
        run: mkdir -p test-results

      - name: 🧪 Run Unit & Integration Tests
        run: npm run test
        continue-on-error: true

      - name: 📝 Vitest Detailed Summary
        if: always()
        run: |
          echo "### 🧪 Результаты Unit-тестов" >> $GITHUB_STEP_SUMMARY
          echo "| Тест | Статус | Время |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :--- |" >> $GITHUB_STEP_SUMMARY
          
          if [ -f test-results/vitest-results.xml ]; then
            # Используем perl для гибкого парсинга XML
            perl -0777 -ne 'while (/<testcase\s+([^>]+)>(.*?)(<\/testcase>|\/>)/gs) { 
              $attrs=$1; $content=$2;
              $name = ($attrs =~ /name="([^"]+)"/) ? $1 : "Unknown";
              $time = ($attrs =~ /time="([^"]+)"/) ? $1 : "0";
              $status = ($content =~ /<failure/) ? "❌" : "✅";
              print "| $name | $status | ${time}s |\n";
            }' test-results/vitest-results.xml >> $GITHUB_STEP_SUMMARY
            
            # Итоговая строка
            TOTAL=$(grep -o 'tests="[^"]*"' test-results/vitest-results.xml | head -1 | cut -d'"' -f2)
            FAILURES=$(grep -o 'failures="[^"]*"' test-results/vitest-results.xml | head -1 | cut -d'"' -f2)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Всего тестов:** $TOTAL | **Упало:** $FAILURES" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚠️ Ошибка | Файл отчета не найден | - |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish Vitest Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Results (Detailed)
          path: test-results/vitest-results.xml
          reporter: java-junit

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-assets
          path: |
            css/style.css
            articles/*.json

  deploy:
    name: 🚀 Deploy & Sync
    needs: [build-and-unit]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-assets

      - name: 💾 Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: обновление манифестов и стилей [skip ci]"
          file_pattern: 'articles/*.json css/style.css'
          disable_globbing: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 Final Summary
        run: |
          echo "### 🚀 Сборка и Деплой завершены" >> $GITHUB_STEP_SUMMARY
          echo "Сайт успешно обновлен и доступен по адресу: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
