<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR/AR Квантум — База знаний</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Библиотека для рендеринга Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kvant: '#8b5cf6',
                        'kvant-dark': '#6d28d9',
                    }
                }
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .heading-font { font-family: 'Unbounded', sans-serif; }
        
        #article-content h1 { font-family: 'Unbounded', sans-serif; font-size: 2.25rem; margin-bottom: 1.5rem; font-weight: 700; color: #8b5cf6; }
        #article-content h2 { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; font-weight: 700; }
        #article-content p { margin-bottom: 1.2rem; line-height: 1.8; color: #475569; }
        .dark #article-content p { color: #cbd5e1; }
        #article-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.2rem; }
        #article-content li { margin-bottom: 0.5rem; }
        #article-content blockquote { border-left: 4px solid #8b5cf6; padding-left: 1rem; font-style: italic; margin-bottom: 1.5rem; color: #64748b; }
        #article-content code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.4rem; font-size: 0.9em; font-family: monospace; }
        .dark #article-content code { background: #1e293b; }
        
        .track-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .track-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

    <!-- Навигация -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-900">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('home')">
                <div class="bg-kvant p-2 rounded-xl text-white shadow-lg shadow-kvant/30">
                    <i class="fas fa-vr-cardboard text-xl"></i>
                </div>
                <span class="heading-font font-bold text-lg tracking-tighter uppercase">VR/AR <span class="text-kvant">Квантум</span></span>
            </div>
            
            <div class="hidden md:flex items-center space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500 dark:text-slate-400">
                <button onclick="showPage('home')" class="nav-item active hover:text-kvant transition" id="nav-home">Главная</button>
                <button onclick="showPage('tracks')" class="nav-item hover:text-kvant transition" id="nav-tracks">Треки</button>
                <button onclick="showPage('cheats')" class="nav-item hover:text-kvant transition" id="nav-cheats">Шпаргалки</button>
                <button onclick="showPage('team')" class="nav-item hover:text-kvant transition" id="nav-team">Команда</button>
                
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-amber-400 hover:rotate-12 transition-all">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Главная -->
    <section id="home" class="page-content pt-32 px-6 active">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-16">
                <h1 class="heading-font text-4xl md:text-6xl mb-6 leading-tight uppercase tracking-tighter">База знаний <br><span class="text-kvant italic text-3xl md:text-5xl">VR Kvant</span></h1>
                <p class="text-lg text-slate-500 dark:text-slate-400 max-w-2xl mx-auto">Добро пожаловать на учебный портал. Здесь собраны все инструкции и задания для работы в квантуме.</p>
            </div>

            <div class="grid md:grid-cols-3 gap-6">
                <!-- Карточки быстрого доступа -->
                <div onclick="loadArticle('articles/blender/intro.md')" class="track-card p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border-2 border-transparent hover:border-orange-500 cursor-pointer shadow-sm">
                    <i class="fas fa-cube text-3xl mb-6 text-orange-500"></i>
                    <h3 class="heading-font text-lg mb-2 uppercase tracking-tight">Blender</h3>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">3D Графика</p>
                </div>
                <div onclick="loadArticle('articles/unity/intro.md')" class="track-card p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border-2 border-transparent hover:border-indigo-500 cursor-pointer shadow-sm">
                    <i class="fab fa-unity text-3xl mb-6 text-indigo-500"></i>
                    <h3 class="heading-font text-lg mb-2 uppercase tracking-tight">Unity</h3>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Разработка</p>
                </div>
                <div onclick="loadArticle('articles/unreal/intro.md')" class="track-card p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border-2 border-transparent hover:border-slate-400 cursor-pointer shadow-sm">
                    <i class="fas fa-bolt text-3xl mb-6 text-slate-700 dark:text-slate-300"></i>
                    <h3 class="heading-font text-lg mb-2 uppercase tracking-tight">Unreal</h3>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Визуализация</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Страница треков -->
    <section id="tracks" class="page-content pt-32 px-6 hidden">
        <div class="max-w-6xl mx-auto">
            <h2 class="heading-font text-3xl mb-12 uppercase tracking-tighter text-center">Обучающие <span class="text-kvant">траектории</span></h2>
            
            <div id="tracks-container" class="grid md:grid-cols-3 gap-8">
                <!-- Сюда подгружаются списки уроков из JSON -->
                <div class="text-center col-span-3 py-10">
                    <i class="fas fa-circle-notch fa-spin text-3xl text-kvant"></i>
                </div>
            </div>
        </div>
    </section>

    <!-- Просмотр статьи -->
    <section id="article-viewer" class="page-content pt-32 px-6 hidden">
        <div class="max-w-4xl mx-auto">
            <button onclick="showPage('tracks')" class="mb-8 group flex items-center text-kvant font-bold uppercase text-xs tracking-widest">
                <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition"></i> Назад к списку
            </button>
            <article id="article-content" class="bg-white dark:bg-slate-900 p-8 md:p-16 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800">
                <!-- Контент Markdown -->
            </article>
        </div>
    </section>

    <!-- Шпаргалки -->
    <section id="cheats" class="page-content pt-32 px-6 hidden">
        <div class="max-w-4xl mx-auto">
            <h2 class="heading-font text-3xl mb-12 uppercase tracking-tighter text-center">Центр <span class="text-kvant">помощи</span></h2>
            <div id="cheats-container" class="space-y-4">
                <!-- Динамические шпаргалки -->
            </div>
        </div>
    </section>

    <footer class="mt-20 py-12 border-t border-slate-100 dark:border-slate-900 text-center text-slate-400 text-[10px] uppercase tracking-[0.2em]">
        <p>© 2024 VR/AR КВАНТУМ • БАЗА ЗНАНИЙ</p>
    </footer>

    <script>
        // Конфигурация путей
        const CONFIG = {
            tracksManifest: 'articles/tracks.json',
            cheatsManifest: 'articles/cheats.json'
        };

        // Навигация
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            const targetPage = document.getElementById(pageId);
            if(targetPage) targetPage.classList.remove('hidden');
            
            window.scrollTo(0, 0);
            
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('text-kvant', 'border-b-2', 'border-kvant');
                if(nav.id === 'nav-' + (pageId === 'article-viewer' ? 'tracks' : pageId)) {
                    nav.classList.add('text-kvant', 'border-b-2', 'border-kvant');
                }
            });

            if (pageId === 'tracks') loadTracksData();
            if (pageId === 'cheats') loadCheatsData();
        }

        // Загрузка списка треков
        async function loadTracksData() {
            const container = document.getElementById('tracks-container');
            try {
                const response = await fetch(CONFIG.tracksManifest);
                const data = await response.json();
                
                container.innerHTML = data.tracks.map(track => `
                    <div class="bg-slate-50 dark:bg-slate-900 rounded-[2.5rem] p-8 border border-slate-100 dark:border-slate-800 flex flex-col">
                        <div class="flex items-center space-x-4 mb-8">
                            <div class="w-12 h-12 ${track.colorClass} rounded-xl flex items-center justify-center text-white">
                                <i class="${track.icon}"></i>
                            </div>
                            <h3 class="heading-font text-xl">${track.name}</h3>
                        </div>
                        <div class="space-y-3 flex-grow">
                            ${track.lessons.map(lesson => `
                                <div onclick="loadArticle('articles/${track.id}/${lesson.file}')" 
                                     class="p-4 bg-white dark:bg-slate-800 rounded-2xl flex justify-between items-center cursor-pointer hover:ring-2 ring-kvant transition">
                                    <span class="font-bold text-sm">${lesson.title}</span>
                                    <i class="fas fa-play text-[10px] text-kvant"></i>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="col-span-3 text-center text-slate-400">Ошибка загрузки списка треков. Проверьте файл tracks.json</p>`;
            }
        }

        // Загрузка шпаргалок
        async function loadCheatsData() {
            const container = document.getElementById('cheats-container');
            try {
                const response = await fetch(CONFIG.cheatsManifest);
                const data = await response.json();
                container.innerHTML = data.cheats.map(cheat => `
                    <details class="group bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 overflow-hidden">
                        <summary class="p-6 cursor-pointer font-bold flex justify-between items-center list-none">
                            ${cheat.title}
                            <i class="fas fa-chevron-down group-open:rotate-180 transition"></i>
                        </summary>
                        <div class="p-6 pt-0 text-slate-500 text-sm border-t border-slate-50 dark:border-slate-800">
                            ${marked.parse(cheat.content)}
                        </div>
                    </details>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-center text-slate-400">Шпаргалки пока не добавлены.</p>`;
            }
        }

        // Загрузка статьи
        async function loadArticle(filePath) {
            showPage('article-viewer');
            const contentArea = document.getElementById('article-content');
            contentArea.innerHTML = '<div class="flex justify-center p-20"><i class="fas fa-circle-notch fa-spin text-4xl text-kvant"></i></div>';
            
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('Статья не найдена');
                const text = await response.text();
                contentArea.innerHTML = marked.parse(text);
            } catch (error) {
                contentArea.innerHTML = `<div class="text-center py-20"><h2 class="heading-font text-2xl mb-4">Файл не найден</h2><p>Путь: ${filePath}</p></div>`;
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        window.onload = () => {
            const themeIcon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        };
    </script>
</body>
</html>
